<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Strategic Retrospective of Cognitive Systems (2022–2026)</title>
  <!-- SEO -->
  <meta name="description" content="A detailed visual analysis of the global shift from generative sequence prediction to stateful autonomous agents, modular hardware interconnects, sovereign local networks, and economic restructuring between 2022 and 2026.">
  <link rel="stylesheet" href="styles.css">
  <!-- Theme bootstrap (inline to avoid FOUC) -->
  <script>
    (function(){
      try{
        var s=localStorage.getItem('ai-report-theme');
        var p=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme',s||(p?'dark':'light'));
      }catch(e){document.documentElement.setAttribute('data-theme','light');}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
