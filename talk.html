<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20-Minute Talk · What's Changing in AI for Software Developers</title>
  <meta name="description" content="A tight 20-minute talking-points script for delivering an honest, demo-led update on the state of AI for software developers — five inflection points, four disciplines, four reality checks, two-week experiment, Q&A prep.">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('ai-report-theme');
        var prefers = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefers ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body class="present-body">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="talk.js"></script>
</body>
</html>
